<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模态框调试测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api_client.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-8 text-center">🔧 模态框功能调试</h1>
        
        <!-- 测试按钮 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">测试按钮</h2>
            <div class="flex flex-wrap gap-4">
                <button id="test-login-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-medium">
                    打开登录模态框
                </button>
                <button id="test-register-btn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-medium">
                    打开注册模态框
                </button>
                <button id="check-elements" class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-3 rounded-lg font-medium">
                    检查元素状态
                </button>
            </div>
        </div>

        <!-- 调试信息 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">调试信息</h2>
            <div id="debug-info" class="font-mono text-sm bg-gray-100 p-4 rounded">
                等待初始化...
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div id="login-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md transform transition-all duration-300 scale-95 opacity-0">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-gray-800">用户登录</h3>
                    <button id="close-login-modal" class="text-gray-400 hover:text-gray-600 text-2xl">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
                <div class="text-center py-8">
                    <p class="text-gray-600">登录模态框已成功打开！</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div id="register-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md transform transition-all duration-300 scale-95 opacity-0">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-gray-800">用户注册</h3>
                    <button id="close-register-modal" class="text-gray-400 hover:text-gray-600 text-2xl">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
                <div class="text-center py-8">
                    <p class="text-gray-600">注册模态框已成功打开！</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 调试日志函数
        function logDebug(message) {
            const debugInfo = document.getElementById('debug-info');
            const timestamp = new Date().toLocaleTimeString();
            debugInfo.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            debugInfo.scrollTop = debugInfo.scrollHeight;
            console.log(message);
        }

        // 显示模态框函数
        function showModal(modalId) {
            logDebug(`尝试显示模态框: ${modalId}`);
            const modal = document.getElementById(modalId);
            const modalContent = modal?.querySelector('div');
            
            if (!modal) {
                logDebug(`❌ 找不到模态框元素: ${modalId}`);
                return;
            }
            
            logDebug(`✅ 找到模态框元素`);
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                if (modalContent) {
                    modalContent.style.transform = 'scale(1)';
                    modalContent.style.opacity = '1';
                    logDebug(`✅ 模态框动画完成`);
                }
            }, 10);
        }

        // 隐藏模态框函数
        function hideModal(modalId) {
            const modal = document.getElementById(modalId);
            const modalContent = modal?.querySelector('div');
            
            if (modalContent) {
                modalContent.style.transform = 'scale(0.95)';
                modalContent.style.opacity = '0';
            }
            
            setTimeout(() => {
                modal?.classList.add('hidden');
            }, 300);
        }

        // 检查元素状态
        function checkElements() {
            logDebug('=== 元素状态检查 ===');
            
            const elements = [
                'login-btn', 'register-btn', 'mobile-login-btn', 'mobile-register-btn',
                'login-modal', 'register-modal', 'close-login-modal', 'close-register-modal'
            ];
            
            elements.forEach(id => {
                const element = document.getElementById(id);
                logDebug(`${id}: ${element ? '✅ 存在' : '❌ 不存在'}`);
            });
            
            logDebug('=== 事件监听器检查 ===');
            logDebug(`DOMContentLoaded 事件数量: ${window.domContentLoadedCount || 0}`);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            logDebug('=== 页面初始化开始 ===');
            
            // 记录DOMContentLoaded事件次数
            window.domContentLoadedCount = (window.domContentLoadedCount || 0) + 1;
            logDebug(`DOMContentLoaded 事件第 ${window.domContentLoadedCount} 次触发`);
            
            // 绑定测试按钮事件
            document.getElementById('test-login-btn')?.addEventListener('click', () => {
                logDebug('点击了测试登录按钮');
                showModal('login-modal');
            });
            
            document.getElementById('test-register-btn')?.addEventListener('click', () => {
                logDebug('点击了测试注册按钮');
                showModal('register-modal');
            });
            
            document.getElementById('check-elements')?.addEventListener('click', checkElements);
            
            // 绑定模态框关闭事件
            document.getElementById('close-login-modal')?.addEventListener('click', () => {
                logDebug('点击了关闭登录模态框');
                hideModal('login-modal');
            });
            
            document.getElementById('close-register-modal')?.addEventListener('click', () => {
                logDebug('点击了关闭注册模态框');
                hideModal('register-modal');
            });
            
            // 点击背景关闭模态框
            document.getElementById('login-modal')?.addEventListener('click', function(e) {
                if (e.target === this) {
                    logDebug('点击登录模态框背景');
                    hideModal('login-modal');
                }
            });
            
            document.getElementById('register-modal')?.addEventListener('click', function(e) {
                if (e.target === this) {
                    logDebug('点击注册模态框背景');
                    hideModal('register-modal');
                }
            });
            
            logDebug('=== 初始化完成 ===');
            checkElements();
        });

        // 错误处理
        window.addEventListener('error', function(e) {
            logDebug(`❌ JavaScript错误: ${e.message} (${e.filename}:${e.lineno})`);
        });
    </script>
</body>
</html>
