    <!-- JavaScript -->
    <script>
        // 移动端菜单切换
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        });

        // 图片上传预览
        const imageUploadArea = document.getElementById('image-upload-area');
        const imageUpload = document.getElementById('image-upload');
        const imagePreviewContainer = document.getElementById('image-preview-container');

        imageUploadArea.addEventListener('click', () => {
            imageUpload.click();
        });

        imageUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageUploadArea.classList.add('border-primary');
        });

        imageUploadArea.addEventListener('dragleave', () => {
            imageUploadArea.classList.remove('border-primary');
        });

        imageUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            imageUploadArea.classList.remove('border-primary');
            
            if (e.dataTransfer.files.length) {
                handleFiles(e.dataTransfer.files);
            }
        });

        imageUpload.addEventListener('change', () => {
            if (imageUpload.files.length) {
                handleFiles(imageUpload.files);
            }
        });

        function handleFiles(files) {
            // 最多显示5张图片
            const filesToProcess = Array.from(files).slice(0, 5);
            imagePreviewContainer.innerHTML = '';
            imagePreviewContainer.classList.remove('hidden');
            
            filesToProcess.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const previewWrapper = document.createElement('div');
                    previewWrapper.className = 'relative aspect-square bg-gray-100 rounded-lg overflow-hidden';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'w-full h-full object-cover';
                    img.alt = `上传图片 ${index + 1}`;
                    
                    const removeButton = document.createElement('button');
                    removeButton.className = 'absolute top-1 right-1 w-6 h-6 bg-black/50 rounded-full flex items-center justify-center text-white hover:bg-black/70 transition-colors';
                    removeButton.innerHTML = '<i class="fa fa-times text-xs"></i>';
                    removeButton.onclick = () => {
                        previewWrapper.remove();
                        if (imagePreviewContainer.children.length === 0) {
                            imagePreviewContainer.classList.add('hidden');
                        }
                    };
                    
                    previewWrapper.appendChild(img);
                    previewWrapper.appendChild(removeButton);
                    imagePreviewContainer.appendChild(previewWrapper);
                };
                reader.readAsDataURL(file);
            });
        }

        // 提交表单
        const submitForm = document.getElementById('submit-form');
        submitForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // 简单的表单验证
            const locationName = document.getElementById('location-name').value;
            const locationType = document.getElementById('location-type').value;
            const city = document.getElementById('city').value;
            const industry = document.getElementById('industry').value;
            const address = document.getElementById('address').value;
            const openTime = document.getElementById('open-time').value;
            const description = document.getElementById('description').value;
            const hasImages = imagePreviewContainer.children.length > 0;
            
            if (!locationName || !locationType || !city || !industry || !address || !openTime || !description || !hasImages) {
                alert('请填写所有必填字段并至少上传一张图片');
                return;
            }
            
            // 模拟提交成功
            alert('提交成功！您的集章点信息已进入审核队列，我们将在24-48小时内完成审核。');
            submitForm.reset();
            imagePreviewContainer.innerHTML = '';
            imagePreviewContainer.classList.add('hidden');
        });

        // 常见问题切换
        document.querySelectorAll('.faq-question').forEach(question => {
            question.addEventListener('click', function() {
                const answer = this.nextElementSibling;
                const icon = this.querySelector('i');
                
                answer.classList.toggle('hidden');
                icon.classList.toggle('rotate-180');
            });
        });

        // 默认展开第一个常见问题
        const firstFaq = document.querySelector('.faq-question');
        if (firstFaq) {
            firstFaq.click();
        }
    </script>
</body>
</html>
