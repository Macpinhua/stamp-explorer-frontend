<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集章地点地图导航与印章资源探索软件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="api_client.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        secondary: '#EC4899',
                        accent: '#10B981',
                        neutral: '#1F2937',
                        light: '#F9FAFB',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .nav-gradient {
            background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%);
        }
        .modal-transition {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <header class="nav-gradient sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center justify-between py-4">
                <div class="flex items-center mb-4 md:mb-0">
                    <div class="bg-white rounded-full p-2 mr-3 shadow-lg">
                        <i class="fa fa-map-marker text-primary text-2xl"></i>
                    </div>
                    <h1 class="text-white text-2xl md:text-3xl font-bold">集章地点地图导航</h1>
                </div>
                
                <!-- 用户状态显示 -->
                <div id="user-auth-section" class="flex items-center space-x-3">
                    <!-- 已登录用户 -->
                    <div id="logged-in-user" class="hidden items-center space-x-3">
                        <div class="flex items-center text-white">
                            <i class="fa fa-user-circle text-xl mr-2"></i>
                            <span id="user-display-name" class="font-medium"></span>
                        </div>
                        <button id="user-logout-btn" class="bg-white/20 hover:bg-white/30 text-white px-3 py-1 rounded-full text-sm">
                            退出
                        </button>
                    </div>
                    
                    <!-- 未登录用户 -->
                    <div id="guest-user" class="flex items-center space-x-2">
                        <button id="login-btn" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg font-medium">
                            登录
                        </button>
                        <button id="register-btn" class="bg-white text-primary px-4 py-2 rounded-lg font-bold hover:bg-gray-100">
                            注册
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 欢迎横幅 -->
        <div class="bg-gradient-to-r from-primary to-secondary text-white rounded-3xl p-8 mb-8 text-center">
            <h2 class="text-4xl font-bold mb-4">欢迎来到集章探索之旅</h2>
            <p class="text-xl mb-6">发现身边的集章地点，收集精美印章，记录您的集章故事</p>
            <div class="flex justify-center gap-4">
                <button onclick="window.location.href='集章社区.html'" 
                        class="bg-white text-primary px-6 py-3 rounded-full font-bold hover:shadow-lg transition-all">
                    进入集章社区
                </button>
                <button class="bg-transparent border-2 border-white text-white px-6 py-3 rounded-full font-bold hover:bg-white/10">
                    了解更多
                </button>
            </div>
        </div>

        <!-- 功能介绍卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-xl transition-shadow">
                <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-users text-primary text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">集章社区</h3>
                <p class="text-gray-600">分享集章经历，与其他集章爱好者交流互动</p>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-xl transition-shadow">
                <div class="w-16 h-16 bg-secondary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-map-marker text-secondary text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">地图导航</h3>
                <p class="text-gray-600">精准定位集章地点，规划最优探索路线</p>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg p-6 text-center hover:shadow-xl transition-shadow">
                <div class="w-16 h-16 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-certificate text-accent text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">印章收藏</h3>
                <p class="text-gray-600">建立个人印章收藏库，记录珍贵回忆</p>
            </div>
        </div>
    </main>

    <!-- 登录模态框 -->
    <div id="login-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md modal-transition">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-gray-800">用户登录</h3>
                    <button id="close-login-modal" class="text-gray-400 hover:text-gray-600 text-2xl">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
                
                <form id="login-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">用户名或邮箱</label>
                        <input type="text" id="login-username" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                        <input type="password" id="login-password" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
                    </div>
                    
                    <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white py-3 rounded-lg font-medium">
                        登录账户
                    </button>
                </form>
                
                <div class="mt-4 text-center text-sm text-gray-600">
                    还没有账户？<button id="switch-to-register" class="text-primary font-medium hover:underline">立即注册</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 注册模态框 -->
    <div id="register-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md modal-transition">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold text-gray-800">用户注册</h3>
                    <button id="close-register-modal" class="text-gray-400 hover:text-gray-600 text-2xl">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
                
                <form id="register-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">邮箱地址</label>
                        <input type="email" id="reg-email" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                        <input type="text" id="reg-username" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">真实姓名（可选）</label>
                        <input type="text" id="reg-fullname" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                        <input type="password" id="reg-password" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
                    </div>
                    
                    <button type="submit" class="w-full bg-secondary hover:bg-secondary/90 text-white py-3 rounded-lg font-medium">
                        注册账户
                    </button>
                </form>
                
                <div class="mt-4 text-center text-sm text-gray-600">
                    已有账户？<button id="switch-to-login" class="text-primary font-medium hover:underline">立即登录</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="toast-message" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 hidden">
        <span id="toast-text"></span>
    </div>

    <script>
        // 全局变量
        let currentUser = null;

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 页面初始化开始');
            initializeAuthSystem();
            checkUserStatus();
        });

        // 初始化认证系统
        function initializeAuthSystem() {
            console.log('🔐 初始化认证系统');
            
            // 绑定登录按钮事件
            document.getElementById('login-btn')?.addEventListener('click', () => {
                console.log('🖱️ 点击登录按钮');
                showModal('login-modal');
            });
            
            // 绑定注册按钮事件
            document.getElementById('register-btn')?.addEventListener('click', () => {
                console.log('🖱️ 点击注册按钮');
                showModal('register-modal');
            });
            
            // 绑定移动端按钮事件（如果存在）
            document.getElementById('mobile-login-btn')?.addEventListener('click', () => showModal('login-modal'));
            document.getElementById('mobile-register-btn')?.addEventListener('click', () => showModal('register-modal'));
            
            // 绑定模态框关闭事件
            document.getElementById('close-login-modal')?.addEventListener('click', () => hideModal('login-modal'));
            document.getElementById('close-register-modal')?.addEventListener('click', () => hideModal('register-modal'));
            
            // 绑定切换模态框事件
            document.getElementById('switch-to-register')?.addEventListener('click', () => {
                hideModal('login-modal');
                showModal('register-modal');
            });
            
            document.getElementById('switch-to-login')?.addEventListener('click', () => {
                hideModal('register-modal');
                showModal('login-modal');
            });
            
            // 绑定表单提交事件
            document.getElementById('login-form')?.addEventListener('submit', handleLogin);
            document.getElementById('register-form')?.addEventListener('submit', handleRegister);
            
            // 绑定退出登录事件
            document.getElementById('user-logout-btn')?.addEventListener('click', logout);
            
            // 点击模态框背景关闭
            document.getElementById('login-modal')?.addEventListener('click', function(e) {
                if (e.target === this) hideModal('login-modal');
            });
            
            document.getElementById('register-modal')?.addEventListener('click', function(e) {
                if (e.target === this) hideModal('register-modal');
            });
            
            console.log('✅ 认证系统初始化完成');
        }

        // 检查用户状态
        async function checkUserStatus() {
            console.log('🔍 检查用户状态');
            try {
                if (apiClient.isAuthenticated()) {
                    const user = await apiClient.getCurrentUser();
                    console.log('✅ 用户已登录:', user.username);
                    showLoggedInUser(user);
                    currentUser = user;
                } else {
                    console.log('ℹ️ 用户未登录');
                    showGuestUser();
                }
            } catch (error) {
                console.log('⚠️ 用户状态检查失败，清除认证状态:', error.message);
                apiClient.logout();
                showGuestUser();
            }
        }

        // 显示已登录用户
        function showLoggedInUser(user) {
            console.log('👤 显示已登录用户:', user.username);
            document.getElementById('user-display-name').textContent = user.username;
            document.getElementById('logged-in-user').classList.remove('hidden');
            document.getElementById('guest-user').classList.add('hidden');
        }

        // 显示访客用户
        function showGuestUser() {
            console.log('👥 显示访客用户');
            document.getElementById('logged-in-user').classList.add('hidden');
            document.getElementById('guest-user').classList.remove('hidden');
        }

        // 显示模态框
        function showModal(modalId) {
            console.log('🖼️ 显示模态框:', modalId);
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('hidden');
                // 添加入场动画
                setTimeout(() => {
                    const modalContent = modal.querySelector('.modal-transition');
                    if (modalContent) {
                        modalContent.style.transform = 'scale(1)';
                        modalContent.style.opacity = '1';
                    }
                }, 10);
            }
        }

        // 隐藏模态框
        function hideModal(modalId) {
            console.log('❌ 隐藏模态框:', modalId);
            const modal = document.getElementById(modalId);
            if (modal) {
                const modalContent = modal.querySelector('.modal-transition');
                if (modalContent) {
                    modalContent.style.transform = 'scale(0.95)';
                    modalContent.style.opacity = '0';
                }
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        // 处理登录
        async function handleLogin(e) {
            e.preventDefault();
            console.log('🔑 处理登录请求');
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            try {
                await apiClient.login({ username, password });
                showMessage('登录成功！', 'success');
                hideModal('login-modal');
                
                // 重置表单
                document.getElementById('login-form').reset();
                
                // 更新用户状态
                const user = await apiClient.getCurrentUser();
                showLoggedInUser(user);
                currentUser = user;
                
            } catch (error) {
                console.error('❌ 登录失败:', error);
                showMessage('登录失败: ' + error.message, 'error');
            }
        }

        // 处理注册
        async function handleRegister(e) {
            e.preventDefault();
            console.log('📝 处理注册请求');
            
            const userData = {
                email: document.getElementById('reg-email').value,
                username: document.getElementById('reg-username').value,
                full_name: document.getElementById('reg-fullname').value,
                password: document.getElementById('reg-password').value
            };
            
            try {
                await apiClient.register(userData);
                showMessage('注册成功！请登录', 'success');
                hideModal('register-modal');
                
                // 重置表单
                document.getElementById('register-form').reset();
                
                // 自动打开登录模态框
                setTimeout(() => {
                    showModal('login-modal');
                }, 1000);
                
            } catch (error) {
                console.error('❌ 注册失败:', error);
                showMessage('注册失败: ' + error.message, 'error');
            }
        }

        // 退出登录
        function logout() {
            console.log('🚪 用户退出登录');
            apiClient.logout();
            showGuestUser();
            currentUser = null;
            showMessage('已退出登录', 'info');
        }

        // 显示消息提示
        function showMessage(message, type = 'info') {
            console.log(`💬 显示消息 [${type}]:`, message);
            const toast = document.getElementById('toast-message');
            const toastText = document.getElementById('toast-text');
            
            toastText.textContent = message;
            
            // 设置颜色
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 ` +
                (type === 'success' ? 'bg-green-500' : 
                 type === 'error' ? 'bg-red-500' : 
                 'bg-blue-500') + ' text-white';
            
            toast.classList.remove('hidden');
            
            // 自动隐藏
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // 错误处理
        window.addEventListener('error', function(e) {
            console.error('💥 JavaScript错误:', e.error);
            showMessage('页面出现错误，请刷新重试', 'error');
        });
    </script>
</body>
</html>
