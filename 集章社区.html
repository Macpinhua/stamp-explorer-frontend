<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集章社区 - 集章地点地图导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api_client.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4361ee',
                        secondary: '#7209b7',
                        accent: '#f72585',
                        dark: '#1e293b',
                        light: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .nav-gradient {
            background: linear-gradient(135deg, #4361ee 0%, #7209b7 50%, #f72585 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .modal-transition {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- 导航栏 -->
    <header class="nav-gradient sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center justify-between py-4">
                <div class="flex items-center mb-4 md:mb-0">
                    <div class="bg-white rounded-full p-2 mr-3 shadow-lg">
                        <i class="fa fa-map-marker text-primary text-2xl"></i>
                    </div>
                    <h1 class="text-white text-2xl md:text-3xl font-bold">集章地点地图导航</h1>
                </div>
                
                <!-- 返回首页按钮 -->
                <button onclick="window.location.href='首页.html'" 
                        class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg font-medium">
                    <i class="fa fa-home mr-2"></i>返回首页
                </button>
            </div>
        </div>
    </header>

    <!-- 社区内容区域 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">集章社区</h1>
            <p class="text-gray-600">分享你的集章故事，与同好交流互动</p>
        </div>

        <!-- 发帖区域 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <div class="flex items-center">
                <div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center mr-4">
                    <i class="fa fa-user text-primary text-xl"></i>
                </div>
                <button id="post-button" class="flex-1 bg-gray-100 rounded-full py-3 px-6 text-left text-gray-500 hover:bg-gray-200 transition-colors">
                    分享你的集章故事...
                </button>
            </div>
        </div>

        <!-- 帖子列表容器 -->
        <div id="posts-container" class="space-y-6">
            <!-- 帖子将在这里动态加载 -->
            <div class="bg-white rounded-xl shadow-lg p-8 text-center">
                <i class="fa fa-spinner fa-spin text-4xl text-gray-400 mb-4"></i>
                <p class="text-gray-500">正在加载帖子...</p>
            </div>
        </div>
    </main>

    <!-- 发帖模态框 -->
    <div id="post-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto modal-transition">
            <div class="p-6 border-b">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-800">分享你的集章故事</h2>
                    <button id="close-post-modal" class="text-gray-500 hover:text-gray-800">
                        <i class="fa fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <div class="p-6">
                <div class="flex items-center mb-4">
                    <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center mr-3">
                        <i class="fa fa-user text-primary"></i>
                    </div>
                    <span class="font-medium">我的账户</span>
                </div>
                <textarea id="post-content" class="w-full border border-gray-300 rounded-lg p-4 h-32 focus:ring-2 focus:ring-primary focus:border-primary resize-none" 
                          placeholder="分享你的集章经历、心得或故事..."></textarea>
                
                <!-- 图片上传 -->
                <div class="mt-4">
                    <label for="post-images" class="flex items-center text-gray-600 hover:text-primary transition-colors cursor-pointer">
                        <i class="fa fa-image text-xl mr-2"></i>
                        <span>添加图片</span>
                    </label>
                    <input id="post-images" name="post-images" type="file" multiple accept="image/*" class="hidden" />
                    <div id="image-preview-container" class="mt-3 grid grid-cols-3 gap-2 hidden">
                        <!-- 图片预览会在这里显示 -->
                    </div>
                </div>
            </div>
            <div class="p-6 border-t bg-gray-50">
                <button id="publish-post" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-primary/90">
                    发布帖子
                </button>
            </div>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="toast-message" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 hidden">
        <span id="toast-text"></span>
    </div>

    <script>
        // 全局变量
        let currentPosts = [];

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 社区页面初始化开始');
            initializeCommunity();
            loadPosts();
        });

        // 初始化社区功能
        function initializeCommunity() {
            console.log('👥 初始化社区功能');
            
            // 绑定发帖按钮事件
            document.getElementById('post-button')?.addEventListener('click', openPostModal);
            document.getElementById('publish-post')?.addEventListener('click', publishPost);
            
            // 绑定模态框事件
            document.getElementById('close-post-modal')?.addEventListener('click', closePostModal);
            
            // 绑定图片上传事件
            document.getElementById('post-images')?.addEventListener('change', handleImageUpload);
            
            // 点击模态框背景关闭
            document.getElementById('post-modal')?.addEventListener('click', function(e) {
                if (e.target === this) closePostModal();
            });
            
            console.log('✅ 社区功能初始化完成');
        }

        // 加载帖子
        async function loadPosts() {
            console.log('📥 开始加载帖子');
            const container = document.getElementById('posts-container');
            
            try {
                const posts = await apiClient.getPosts();
                console.log(`✅ 成功加载 ${posts.length} 个帖子`);
                currentPosts = posts;
                displayPosts(posts);
            } catch (error) {
                console.error('❌ 加载帖子失败:', error);
                container.innerHTML = `
                    <div class="bg-white rounded-xl shadow-lg p-8 text-center">
                        <i class="fa fa-exclamation-triangle text-4xl text-yellow-500 mb-4"></i>
                        <p class="text-gray-500">加载帖子失败: ${error.message}</p>
                        <button onclick="loadPosts()" class="mt-4 bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90">
                            重新加载
                        </button>
                    </div>
                `;
            }
        }

        // 显示帖子
        function displayPosts(posts) {
            console.log('📋 显示帖子列表');
            const container = document.getElementById('posts-container');
            
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-xl shadow-lg p-8 text-center">
                        <i class="fa fa-inbox text-4xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500">暂无帖子，快来分享你的集章故事吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => createPostElement(post)).join('');
            
            // 为每个点赞按钮绑定事件
            document.querySelectorAll('.post-like-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const postId = this.dataset.postId;
                    likePost(postId, this);
                });
            });
        }

        // 创建帖子元素
        function createPostElement(post) {
            console.log('📄 创建帖子元素:', post.id);
            
            // 处理图片
            let imagesHtml = '';
            if (post.images && post.images.length > 0) {
                const cols = post.images.length === 1 ? 'grid-cols-1' : 
                           post.images.length === 2 ? 'grid-cols-2' : 'grid-cols-3';
                imagesHtml = `
                    <div class="grid ${cols} gap-2 mb-4">
                        ${post.images.map(img => `
                            <img src="${img}" alt="帖子图片" class="w-full aspect-square object-cover rounded-lg">
                        `).join('')}
                    </div>
                `;
            }

            return `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden card-hover">
                    <div class="p-6">
                        <div class="flex items-center mb-4">
                            <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center mr-4">
                                <i class="fa fa-user text-gray-500"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-gray-800">${post.author?.username || '匿名用户'}</h3>
                                <p class="text-sm text-gray-500">${new Date(post.created_at).toLocaleString()}</p>
                            </div>
                        </div>
                        <p class="text-gray-700 mb-4">${post.content}</p>
                        ${imagesHtml}
                        <div class="flex items-center text-gray-500">
                            <button class="flex items-center mr-6 post-like-btn" data-post-id="${post.id}">
                                <i class="fa fa-heart mr-1 ${post.is_liked ? 'text-red-500' : 'text-gray-400'}"></i> 
                                <span class="like-count">${post.like_count || 0}</span>
                            </button>
                            <button class="flex items-center mr-6">
                                <i class="fa fa-comment mr-1"></i> ${post.comment_count || 0}
                            </button>
                            <button class="flex items-center">
                                <i class="fa fa-share-alt mr-1"></i> 分享
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // 点赞功能
        async function likePost(postId, likeBtn) {
            console.log('❤️ 处理点赞:', postId);
            
            if (!apiClient.isAuthenticated()) {
                showMessage('请先登录后再点赞', 'error');
                return;
            }

            try {
                await apiClient.likePost(postId);
                
                // 更新UI
                const heartIcon = likeBtn.querySelector('i');
                const likeCount = likeBtn.querySelector('.like-count');
                const currentCount = parseInt(likeCount.textContent);
                
                if (heartIcon.classList.contains('text-red-500')) {
                    // 取消点赞
                    heartIcon.classList.remove('text-red-500');
                    heartIcon.classList.add('text-gray-400');
                    likeCount.textContent = currentCount - 1;
                    showMessage('已取消点赞', 'info');
                } else {
                    // 点赞
                    heartIcon.classList.remove('text-gray-400');
                    heartIcon.classList.add('text-red-500');
                    likeCount.textContent = currentCount + 1;
                    showMessage('点赞成功！', 'success');
                }
                
            } catch (error) {
                console.error('❌ 点赞失败:', error);
                showMessage('点赞失败: ' + error.message, 'error');
            }
        }

        // 打开发帖模态框
        function openPostModal() {
            console.log('📝 打开发帖模态框');
            
            if (!apiClient.isAuthenticated()) {
                showMessage('请先登录后再发帖', 'error');
                return;
            }
            
            document.getElementById('post-modal').classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        // 关闭发帖模态框
        function closePostModal() {
            console.log('❌ 关闭发帖模态框');
            document.getElementById('post-modal').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
            resetPostForm();
        }

        // 重置发帖表单
        function resetPostForm() {
            console.log('🔄 重置发帖表单');
            document.getElementById('post-content').value = '';
            document.getElementById('post-images').value = '';
            document.getElementById('image-preview-container').innerHTML = '';
            document.getElementById('image-preview-container').classList.add('hidden');
        }

        // 处理图片上传
        function handleImageUpload(e) {
            console.log('🖼️ 处理图片上传');
            const imagePreviewContainer = document.getElementById('image-preview-container');
            imagePreviewContainer.innerHTML = '';
            
            if (e.target.files && e.target.files.length > 0) {
                imagePreviewContainer.classList.remove('hidden');
                
                Array.from(e.target.files).forEach((file, index) => {
                    if (file.size > 5 * 1024 * 1024) {
                        showMessage('图片大小不能超过5MB', 'error');
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const preview = document.createElement('div');
                        preview.className = 'relative w-20 h-20 bg-gray-100 rounded-lg overflow-hidden m-1';
                        preview.innerHTML = `
                            <img src="${event.target.result}" class="w-full h-full object-cover">
                            <button class="absolute top-1 right-1 bg-black/50 text-white rounded-full w-6 h-6 flex items-center justify-center hover:bg-black/70 delete-image" data-index="${index}">
                                <i class="fa fa-times text-xs"></i>
                            </button>
                        `;
                        imagePreviewContainer.appendChild(preview);
                        
                        // 绑定删除事件
                        preview.querySelector('.delete-image').addEventListener('click', function() {
                            preview.remove();
                            if (imagePreviewContainer.children.length === 0) {
                                imagePreviewContainer.classList.add('hidden');
                            }
                        });
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        // 发布帖子
        async function publishPost() {
            console.log('📤 发布帖子');
            
            if (!apiClient.isAuthenticated()) {
                showMessage('请先登录', 'error');
                return;
            }

            const content = document.getElementById('post-content').value.trim();
            
            if (!content) {
                showMessage('请输入帖子内容', 'error');
                return;
            }

            // 显示加载状态
            const publishBtn = document.getElementById('publish-post');
            const originalText = publishBtn.textContent;
            publishBtn.textContent = '发布中...';
            publishBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('content', content);
                
                // 添加图片
                const imageInput = document.getElementById('post-images');
                if (imageInput.files.length > 0) {
                    Array.from(imageInput.files).forEach((file, index) => {
                        formData.append(`images`, file);
                    });
                }

                await apiClient.createPost(formData);
                showMessage('发布成功！', 'success');
                closePostModal();
                loadPosts(); // 重新加载帖子
                
            } catch (error) {
                console.error('❌ 发布失败:', error);
                showMessage('发布失败: ' + error.message, 'error');
            } finally {
                // 恢复按钮状态
                publishBtn.textContent = originalText;
                publishBtn.disabled = false;
            }
        }

        // 显示消息
        function showMessage(message, type = 'info') {
            console.log(`💬 显示消息 [${type}]:`, message);
            const toast = document.getElementById('toast-message');
            const toastText = document.getElementById('toast-text');
            
            toastText.textContent = message;
            
            // 设置颜色
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 ` +
                (type === 'success' ? 'bg-green-500' : 
                 type === 'error' ? 'bg-red-500' : 
                 'bg-blue-500') + ' text-white';
            
            toast.classList.remove('hidden');
            
            // 自动隐藏
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // 错误处理
        window.addEventListener('error', function(e) {
            console.error('💥 JavaScript错误:', e.error);
            showMessage('页面出现错误，请刷新重试', 'error');
        });
    </script>
</body>
</html>
