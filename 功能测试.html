<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能测试页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api_client.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6 text-center">🚀 前端功能测试</h1>
        
        <div class="space-y-4">
            <!-- API连接测试 -->
            <div class="border p-4 rounded-lg">
                <h2 class="font-semibold mb-2">🌐 API连接测试</h2>
                <button id="test-api-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
                    测试API连接
                </button>
                <div id="api-result" class="mt-2 text-sm"></div>
            </div>

            <!-- 用户注册测试 -->
            <div class="border p-4 rounded-lg">
                <h2 class="font-semibold mb-2">👤 用户注册测试</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
                    <input type="email" id="test-email" placeholder="邮箱" class="border p-2 rounded" value="test@example.com">
                    <input type="text" id="test-username" placeholder="用户名" class="border p-2 rounded" value="testuser">
                    <input type="text" id="test-fullname" placeholder="姓名" class="border p-2 rounded" value="测试用户">
                    <input type="password" id="test-password" placeholder="密码" class="border p-2 rounded" value="Test1234!">
                </div>
                <button id="test-register-btn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">
                    测试注册
                </button>
                <div id="register-result" class="mt-2 text-sm"></div>
            </div>

            <!-- 用户登录测试 -->
            <div class="border p-4 rounded-lg">
                <h2 class="font-semibold mb-2">🔑 用户登录测试</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
                    <input type="text" id="login-username" placeholder="用户名" class="border p-2 rounded" value="testuser">
                    <input type="password" id="login-password" placeholder="密码" class="border p-2 rounded" value="Test1234!">
                </div>
                <button id="test-login-btn" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded">
                    测试登录
                </button>
                <div id="login-result" class="mt-2 text-sm"></div>
            </div>

            <!-- 发帖测试 -->
            <div class="border p-4 rounded-lg">
                <h2 class="font-semibold mb-2">📝 发帖测试</h2>
                <textarea id="post-content" placeholder="帖子内容" class="w-full border p-2 rounded mb-2" rows="3">测试帖子内容</textarea>
                <button id="test-post-btn" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded">
                    测试发帖
                </button>
                <div id="post-result" class="mt-2 text-sm"></div>
            </div>

            <!-- 帖子列表测试 -->
            <div class="border p-4 rounded-lg">
                <h2 class="font-semibold mb-2">📰 帖子列表测试</h2>
                <button id="test-posts-btn" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded">
                    加载帖子列表
                </button>
                <div id="posts-result" class="mt-2 text-sm"></div>
                <div id="posts-list" class="mt-3 space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // 显示结果
        function showResult(elementId, message, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `mt-2 text-sm ${isSuccess ? 'text-green-600' : 'text-red-600'}`;
        }

        // 测试API连接
        document.getElementById('test-api-btn').addEventListener('click', async function() {
            try {
                const response = await fetch('https://stamp-explorer.vercel.app/api/users/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                showResult('api-result', `✅ API连接成功，状态码: ${response.status}`, response.status === 422);
            } catch (error) {
                showResult('api-result', `❌ API连接失败: ${error.message}`, false);
            }
        });

        // 测试用户注册
        document.getElementById('test-register-btn').addEventListener('click', async function() {
            const userData = {
                email: document.getElementById('test-email').value,
                username: document.getElementById('test-username').value,
                full_name: document.getElementById('test-fullname').value,
                password: document.getElementById('test-password').value
            };

            try {
                const result = await apiClient.register(userData);
                showResult('register-result', '✅ 用户注册成功！', true);
            } catch (error) {
                showResult('register-result', `❌ 注册失败: ${error.message}`, false);
            }
        });

        // 测试用户登录
        document.getElementById('test-login-btn').addEventListener('click', async function() {
            const credentials = {
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value
            };

            try {
                const result = await apiClient.login(credentials);
                showResult('login-result', '✅ 用户登录成功！', true);
            } catch (error) {
                showResult('login-result', `❌ 登录失败: ${error.message}`, false);
            }
        });

        // 测试发帖
        document.getElementById('test-post-btn').addEventListener('click', async function() {
            if (!apiClient.isAuthenticated()) {
                showResult('post-result', '❌ 请先登录', false);
                return;
            }

            const formData = new FormData();
            formData.append('content', document.getElementById('post-content').value);

            try {
                const result = await apiClient.createPost(formData);
                showResult('post-result', '✅ 帖子发布成功！', true);
            } catch (error) {
                showResult('post-result', `❌ 发帖失败: ${error.message}`, false);
            }
        });

        // 测试加载帖子
        document.getElementById('test-posts-btn').addEventListener('click', async function() {
            try {
                const posts = await apiClient.getPosts();
                showResult('posts-result', `✅ 成功加载 ${posts.length} 个帖子`, true);
                
                const postsList = document.getElementById('posts-list');
                postsList.innerHTML = posts.slice(0, 3).map(post => `
                    <div class="border p-3 rounded bg-gray-50">
                        <div class="font-medium">${post.author?.username || '匿名'}</div>
                        <div class="text-sm text-gray-600">${post.content}</div>
                        <div class="text-xs text-gray-500 mt-1">${new Date(post.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                showResult('posts-result', `❌ 加载帖子失败: ${error.message}`, false);
            }
        });
    </script>
</body>
</html>
