<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>з”ЁжҲ·зҷ»еҪ• - йӣҶз« жҺўзҙўе№іеҸ°</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        secondary: '#EC4899',
                        accent: '#10B981',
                        neutral: '#1F2937',
                        light: '#F9FAFB',
                    }
                }
            }
        }
    </script>
    <style>
        .nav-gradient {
            background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%);
        }
        .login-bg {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="login-bg">
    <!-- еҜјиҲӘж Ҹ -->
    <header class="nav-gradient sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between py-4">
                <div class="flex items-center">
                    <div class="bg-white rounded-full p-2 mr-3 shadow-lg">
                        <i class="fa fa-map-marker text-primary text-2xl"></i>
                    </div>
                    <h1 class="text-white text-2xl font-bold">йӣҶз« ең°зӮ№ең°еӣҫеҜјиҲӘ</h1>
                </div>
                <nav class="hidden md:flex space-x-4">
                    <a href="/" class="text-white hover:text-gray-200 font-medium">
                        <i class="fa fa-home mr-1"></i>иҝ”еӣһйҰ–йЎө
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- зҷ»еҪ•иЎЁеҚ• -->
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center">
                    <div class="mx-auto w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
                        <i class="fa fa-user text-primary text-2xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-2">ж¬ўиҝҺеӣһжқҘ</h2>
                    <p class="text-gray-600">зҷ»еҪ•жӮЁзҡ„иҙҰжҲ·з»§з»ӯйӣҶз« д№Ӣж—…</p>
                </div>

                <!-- ж¶ҲжҒҜжҸҗзӨәеҢәеҹҹ -->
                <div id="flash-messages"></div>

                <form class="mt-8 space-y-6" method="POST">
                    <div class="space-y-4">
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                                з”ЁжҲ·еҗҚ
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-user text-gray-400"></i>
                                </div>
                                <input id="username" name="username" type="text" required
                                       class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                                       placeholder="иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ">
                            </div>
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                                еҜҶз Ғ
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-lock text-gray-400"></i>
                                </div>
                                <input id="password" name="password" type="password" required
                                       class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                                       placeholder="иҜ·иҫ“е…ҘеҜҶз Ғ">
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox"
                                   class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">
                                и®°дҪҸжҲ‘
                            </label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-primary hover:text-primary/80">
                                еҝҳи®°еҜҶз Ғпјҹ
                            </a>
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full bg-gradient-to-r from-primary to-secondary text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition-all shadow-lg">
                        зҷ»еҪ•
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        иҝҳжІЎжңүиҙҰжҲ·пјҹ
                        <a href="/register" class="font-medium text-primary hover:text-primary/80">
                            з«ӢеҚіжіЁеҶҢ
                        </a>
                    </p>
                </div>

                <div class="mt-8 pt-6 border-t border-gray-200">
                    <div class="text-center text-sm text-gray-500">
                        <p>В© 2024 йӣҶз« жҺўзҙўе№іеҸ°. дҝқз•ҷжүҖжңүжқғеҲ©.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // иЎЁеҚ•жҸҗдәӨеӨ„зҗҶ
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // иҺ·еҸ–иЎЁеҚ•ж•°жҚ®
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // еҹәжң¬йӘҢиҜҒ
            if (!username || !password) {
                showMessage('иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚе’ҢеҜҶз Ғ', 'error');
                return;
            }
            
            // жҳҫзӨәеҠ иҪҪзҠ¶жҖҒ
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>зҷ»еҪ•дёӯ...';
            
            try {
                // и°ғз”ЁAPIзҷ»еҪ•
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // дҝқеӯҳtokenеҲ°localStorage
                    localStorage.setItem('token', data.access_token);
                    showMessage('зҷ»еҪ•жҲҗеҠҹпјҒжӯЈеңЁи·іиҪ¬...', 'success');
                    
                    // ж №жҚ®и®°дҪҸжҲ‘йҖүйЎ№еҶіе®ҡtokenдҝқеӯҳж—¶й—ҙ
                    const rememberMe = document.getElementById('remember-me').checked;
                    if (rememberMe) {
                        // и®ҫзҪ®7еӨ©иҝҮжңҹ
                        const expiryDate = new Date();
                        expiryDate.setDate(expiryDate.getDate() + 7);
                        localStorage.setItem('token_expiry', expiryDate.toISOString());
                    }
                    
                    // и·іиҪ¬еҲ°зӨҫеҢәйЎөйқў
                    setTimeout(() => {
                        window.location.href = '/community';
                    }, 1500);
                } else {
                    showMessage(data.detail || 'зҷ»еҪ•еӨұиҙҘпјҢиҜ·жЈҖжҹҘз”ЁжҲ·еҗҚе’ҢеҜҶз Ғ', 'error');
                }
            } catch (error) {
                console.error('зҷ»еҪ•й”ҷиҜҜ:', error);
                showMessage('зҪ‘з»ңй”ҷиҜҜпјҢиҜ·жЈҖжҹҘиҝһжҺҘеҗҺйҮҚиҜ•', 'error');
            } finally {
                // жҒўеӨҚжҢүй’®зҠ¶жҖҒ
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
        
        // йЎөйқўеҠ иҪҪж—¶жЈҖжҹҘжҳҜеҗҰе·Іжңүжңүж•Ҳзҡ„token
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const expiry = localStorage.getItem('token_expiry');
            
            if (token && expiry) {
                const expiryDate = new Date(expiry);
                if (expiryDate > new Date()) {
                    // tokenд»Қз„¶жңүж•ҲпјҢзӣҙжҺҘи·іиҪ¬еҲ°зӨҫеҢә
                    window.location.href = '/community';
                } else {
                    // tokenе·ІиҝҮжңҹпјҢжё…йҷӨеӯҳеӮЁ
                    localStorage.removeItem('token');
                    localStorage.removeItem('token_expiry');
                }
            }
        });
        
        // жҳҫзӨәж¶ҲжҒҜеҮҪж•°
        function showMessage(message, type) {
            // з§»йҷӨзҺ°жңүзҡ„ж¶ҲжҒҜ
            const existingMessage = document.querySelector('.message-alert');
            if (existingMessage) {
                existingMessage.remove();
            }
            
            // еҲӣе»әж–°зҡ„ж¶ҲжҒҜе…ғзҙ 
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-alert mt-4 p-3 rounded-lg ${
                type === 'success' 
                    ? 'bg-green-100 border border-green-400 text-green-700' 
                    : 'bg-red-100 border border-red-400 text-red-700'
            }`;
            messageDiv.innerHTML = `
                <div class="flex items-center">
                    <i class="fa ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>
                    <span>${message}</span>
                </div>
            `;
            
            // жҸ’е…ҘеҲ°иЎЁеҚ•еүҚйқў
            const form = document.querySelector('form');
            form.parentNode.insertBefore(messageDiv, form);
            
            // 3з§’еҗҺиҮӘеҠЁз§»йҷӨ
            setTimeout(() => {
                if (messageDiv.parentNode) {
                    messageDiv.remove();
                }
            }, 3000);
        }
        
        // еҝҳи®°еҜҶз Ғй“ҫжҺҘзӮ№еҮ»дәӢд»¶
        document.querySelector('[href="#"]').addEventListener('click', function(e) {
            e.preventDefault();
            showMessage('еҝҳи®°еҜҶз ҒеҠҹиғҪеҚіе°ҶдёҠзәҝпјҢж•¬иҜ·жңҹеҫ…пјҒ', 'info');
        });
    </script>
